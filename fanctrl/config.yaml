name: "FanCtrl"
version: "0.5.4"
slug: "fanctrl"
description: "Temperature-based fan control via GPIO (gpiod)"
url: "https://github.com/m00sfett/ha-addon-fanctrl"
startup: "services"
arch:
  - aarch64
  - amd64
  - armv7
map:
  - config:rw
gpio: true
devicetree: true
apparmor: true
full_access: false
devices:
  - /dev/gpiochip0:/dev/gpiochip0
  - /dev/gpiochip1:/dev/gpiochip1
  - /dev/gpiochip2:/dev/gpiochip2
  - /dev/gpiochip3:/dev/gpiochip3
  - /dev/gpiochip4:/dev/gpiochip4
options:
  gpio_chip: "gpiochip0"
  gpio_pin: 33
  poll_interval_s: 5.0
  temp_on_c: 55.0
  temp_off_c: 45.0
  min_switch_s: 10.0
  active_high: true
schema:
  gpio_chip: str
  gpio_pin: int
  poll_interval_s: float
  temp_on_c: float
  temp_off_c: float
  min_switch_s: float
  active_high: bool
changelog:
  "0.5.4": |
    - Fixed core fallback config path to `/config/fanctrl.toml`.
    - Hardened app security profile (AppArmor enabled, no full access, no `/dev/mem`/`/dev/gpiomem`, no `SYS_RAWIO`).
    - Updated add-on docs to current Home Assistant Apps navigation and clarified status endpoint scope.
  "0.5.3": |
    - Updated Home Assistant navigation in docs from Add-ons to Apps.
    - Updated core package pin to fanctrl 0.5.3.
    - Reduced app privileges (no full access, no /dev/mem, no SYS_RAWIO).
  "0.5.2": |
    - Updated core package pin to fanctrl 0.5.2.
    - Removed AGENTS.md from repository and excluded it via .gitignore.
  "0.5.1": |
    - Updated core package pin to fanctrl 0.5.1.
    - Enabled release notes display in the Home Assistant Add-on Store.
    - Added metadata validation for version/changelog consistency.
  "0.5.0": |
    - Updated add-on to fanctrl 0.5.0.
# Use 'local' build argument or similar in real repo
init: false
